spring:
  application:
    name: fuorimondo-backend
  profiles:
    active: dev
  threads:
    virtual:
      enabled: true
  jpa:
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

server:
  port: 8080
  servlet:
    session:
      timeout: 7d
      cookie:
        name: FMSESSION
        http-only: true
        same-site: strict
        # secure: true  (activé en prod uniquement)

fuorimondo:
  invitation-code:
    length: 6
    expiration-days: 90
  password-reset:
    expiration-hours: 1
  rate-limit:
    login-attempts-per-15min: 5
    activation-attempts-per-15min: 5
    reset-attempts-per-15min: 5
  uploads:
    dir: ${FUORIMONDO_UPLOADS_DIR:./uploads}
  order:
    reservation-ttl-minutes: 15
    expiration-job-interval-minutes: 5

management:
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
  api-docs:
    path: /v3/api-docs

mollie:
  api-key: ${MOLLIE_API_KEY:}
  enabled: ${MOLLIE_ENABLED:true}
  api-base-url: https://api.mollie.com/v2
  redirect-base-url: ${APP_BASE_URL:http://localhost:5273}
  webhook-base-url: ${WEBHOOK_BASE_URL:}
