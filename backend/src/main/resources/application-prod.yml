spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/fuorimondo}
    driver-class-name: org.postgresql.Driver
    username: ${DB_USER}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
  session:
    store-type: jdbc

server:
  servlet:
    session:
      cookie:
        secure: true

logging:
  level:
    com.fuorimondo: INFO
