spring:
  datasource:
    url: jdbc:h2:file:./data/fuorimondo-dev;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password: ''
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: true
    locations: classpath:db/migration
  h2:
    console:
      enabled: true
      path: /h2-console
  session:
    store-type: jdbc
    jdbc:
      initialize-schema: always

logging:
  level:
    com.fuorimondo: DEBUG
    org.springframework.security: INFO

mollie:
  enabled: false

fuorimondo:
  rate-limit:
    login-attempts-per-15min: 1000
    activation-attempts-per-15min: 1000
    reset-attempts-per-15min: 1000
