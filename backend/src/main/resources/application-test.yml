spring:
  datasource:
    url: jdbc:h2:mem:fuorimondo-test;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: ''
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: true
    locations: classpath:db/migration
  session:
    store-type: none

logging:
  level:
    com.fuorimondo: DEBUG

mollie:
  enabled: false
  redirect-base-url: http://localhost:5273
